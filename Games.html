<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfólio | Bruna Menezes</title>
    <link rel="stylesheet" href="novoestilo.css">
    <link rel="icon" href="sobre/favicon.ico">
</head>

<body>

<header>
    <h2 id="title">Portfólio</h2>

    <nav>
        <a href="index.html">Home</a> |
        <a href="Games.html">Games</a>
        <button id="themetoggle">🌙</button>
    </nav>
</header>

<h1>Search Games</h1>

<div class="search-box">
  <input type="text" id="searchInput" placeholder="Pesquisar jogo">
  <button id="btn">Buscar</button>
</div>

<div id="resultados" class="grid"></div>

<div id="modal" class="modal">
  <div class="modal-content">
    <span id="close">&times;</span>
    <div id="modal-body"></div>
  </div>
</div>

<script src="script.js"></script>












<script>
const themeButton = document.getElementById("themetoggle");

themeButton.addEventListener("click", () => {
    document.body.classList.toggle("dark-mode");

    if(document.body.classList.contains("dark-mode")){
        localStorage.setItem("theme","dark");
        themeButton.textContent = "☀️";
    } else {
        localStorage.setItem("theme","light");
        themeButton.textContent = "🌚";
    }
});

window.onload = () => {
    const theme = localStorage.getItem("theme");

    if(theme === "dark"){
        document.body.classList.add("dark-mode");
        themeButton.textContent = "☀️";
    } else {
        themeButton.textContent = "🌚";
    }
};
</script>

</body>
</html>
